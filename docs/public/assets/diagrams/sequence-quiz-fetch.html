<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시퀀스 · 문제 출제</title>
  <style>
    :root {
      --bg: #fafbfc;
      --fg: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --accent: #0969da;
      --card-bg: #ffffff;
      --lifeline: #afb8c1;
      --arrow: #1f2328;
      --activation: #ddf4ff;
      --activation-border: #54aeff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --accent: #2f81f7;
        --card-bg: #161b22;
        --lifeline: #484f58;
        --arrow: #e6edf3;
        --activation: #0c2d6b;
        --activation-border: #2f81f7;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 48px 24px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
                   "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.5;
    }

    .wrapper { max-width: 1100px; margin: 0 auto; }
    header { margin-bottom: 24px; }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 600; }
    .subtitle { margin: 0; color: var(--muted); font-size: 14px; }

    .diagram-card {
      padding: 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-x: auto;
    }

    .seq-svg {
      display: block;
      min-width: 920px;
    }

    .actor-label {
      font: 600 13px -apple-system, BlinkMacSystemFont, sans-serif;
      fill: var(--fg);
    }

    .actor-box {
      fill: var(--card-bg);
      stroke: var(--border);
      stroke-width: 1.5;
    }

    .lifeline {
      stroke: var(--lifeline);
      stroke-width: 1.2;
      stroke-dasharray: 4 4;
    }

    .activation {
      fill: var(--activation);
      stroke: var(--activation-border);
      stroke-width: 1;
    }

    .msg-line {
      stroke: var(--arrow);
      stroke-width: 1.5;
      fill: none;
    }

    .msg-line.return {
      stroke-dasharray: 5 4;
    }

    .msg-label {
      font: 11.5px ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      fill: var(--fg);
    }

    .msg-label.return {
      fill: var(--muted);
    }

    .step-num {
      font: 700 10px -apple-system, BlinkMacSystemFont, sans-serif;
      fill: var(--accent);
    }

    .legend {
      margin-top: 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 12.5px;
      color: var(--muted);
    }

    .legend-item { display: flex; align-items: center; gap: 8px; }

    .legend-swatch {
      width: 32px;
      height: 2px;
      background: var(--arrow);
    }
    .legend-swatch.return {
      background: repeating-linear-gradient(
        to right,
        var(--muted) 0 5px,
        transparent 5px 9px
      );
      height: 2px;
    }

    footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>시퀀스 · 문제 출제</h1>
      <p class="subtitle">GET /api/v1/sentences/random?level=3&amp;category=DAILY</p>
    </header>

    <div class="diagram-card">
      <svg class="seq-svg" viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="문제 출제 시퀀스 다이어그램">
        <!-- Actor boxes (column x centers): 100, 280, 460, 640, 820 -->
        <!-- 1) Actor row -->
        <g>
          <rect class="actor-box" x="40"  y="20" width="120" height="40" rx="6"/>
          <text class="actor-label" x="100" y="45" text-anchor="middle">Client</text>

          <rect class="actor-box" x="190" y="20" width="180" height="40" rx="6"/>
          <text class="actor-label" x="280" y="45" text-anchor="middle">SentenceController</text>

          <rect class="actor-box" x="380" y="20" width="160" height="40" rx="6"/>
          <text class="actor-label" x="460" y="45" text-anchor="middle">SentenceService</text>

          <rect class="actor-box" x="550" y="20" width="180" height="40" rx="6"/>
          <text class="actor-label" x="640" y="45" text-anchor="middle">SentenceRepository</text>

          <rect class="actor-box" x="760" y="20" width="120" height="40" rx="6"/>
          <text class="actor-label" x="820" y="45" text-anchor="middle">PostgreSQL</text>
        </g>

        <!-- 2) Lifelines (from y=60 to y=540) -->
        <line class="lifeline" x1="100" y1="60" x2="100" y2="540"/>
        <line class="lifeline" x1="280" y1="60" x2="280" y2="540"/>
        <line class="lifeline" x1="460" y1="60" x2="460" y2="540"/>
        <line class="lifeline" x1="640" y1="60" x2="640" y2="540"/>
        <line class="lifeline" x1="820" y1="60" x2="820" y2="540"/>

        <!-- Arrow marker definitions -->
        <defs>
          <marker id="head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
            <path d="M0,0 L0,10 L10,5 z" fill="currentColor"/>
          </marker>
        </defs>

        <!-- 3) Activation bars (얇은 박스로 lifeline 위에 표시) -->
        <rect class="activation" x="275" y="100" width="10" height="380" rx="2"/>   <!-- Controller -->
        <rect class="activation" x="455" y="140" width="10" height="300" rx="2"/>   <!-- Service -->
        <rect class="activation" x="635" y="180" width="10" height="180" rx="2"/>   <!-- Repository -->
        <rect class="activation" x="815" y="220" width="10" height="100" rx="2"/>   <!-- DB -->

        <!-- 4) Messages -->
        <!-- step 1: Client → Controller -->
        <g color="var(--arrow)">
          <text class="step-num" x="105" y="92">1</text>
          <line class="msg-line" x1="100" y1="100" x2="275" y2="100" marker-end="url(#head)"/>
          <text class="msg-label" x="187" y="93" text-anchor="middle">GET /sentences/random</text>
        </g>

        <!-- step 2: Controller → Service -->
        <g color="var(--arrow)">
          <text class="step-num" x="285" y="132">2</text>
          <line class="msg-line" x1="285" y1="140" x2="455" y2="140" marker-end="url(#head)"/>
          <text class="msg-label" x="370" y="133" text-anchor="middle">pickRandom(filter)</text>
        </g>

        <!-- step 3: Service → Repository -->
        <g color="var(--arrow)">
          <text class="step-num" x="465" y="172">3</text>
          <line class="msg-line" x1="465" y1="180" x2="635" y2="180" marker-end="url(#head)"/>
          <text class="msg-label" x="550" y="173" text-anchor="middle">findRandomBy(filter)</text>
        </g>

        <!-- step 4: Repository → DB -->
        <g color="var(--arrow)">
          <text class="step-num" x="645" y="212">4</text>
          <line class="msg-line" x1="645" y1="220" x2="815" y2="220" marker-end="url(#head)"/>
          <text class="msg-label" x="730" y="213" text-anchor="middle">ORDER BY RANDOM() LIMIT 1</text>
        </g>

        <!-- step 5: DB → Repository (return) -->
        <g color="var(--muted)">
          <text class="step-num" x="800" y="312">5</text>
          <line class="msg-line return" x1="815" y1="320" x2="645" y2="320" marker-end="url(#head)"/>
          <text class="msg-label return" x="730" y="313" text-anchor="middle">row</text>
        </g>

        <!-- step 6: Repository → Service (return) -->
        <g color="var(--muted)">
          <text class="step-num" x="620" y="352">6</text>
          <line class="msg-line return" x1="635" y1="360" x2="465" y2="360" marker-end="url(#head)"/>
          <text class="msg-label return" x="550" y="353" text-anchor="middle">SentenceEntity</text>
        </g>

        <!-- step 7: Service → Controller (return) -->
        <g color="var(--muted)">
          <text class="step-num" x="440" y="432">7</text>
          <line class="msg-line return" x1="455" y1="440" x2="285" y2="440" marker-end="url(#head)"/>
          <text class="msg-label return" x="370" y="433" text-anchor="middle">SentenceEntity</text>
        </g>

        <!-- step 8: Controller → Client (return) -->
        <g color="var(--muted)">
          <text class="step-num" x="260" y="472">8</text>
          <line class="msg-line return" x1="275" y1="480" x2="100" y2="480" marker-end="url(#head)"/>
          <text class="msg-label return" x="187" y="473" text-anchor="middle">200 OK · SentenceResponse</text>
        </g>
      </svg>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-swatch"></span>
          <span>요청 (synchronous call)</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch return"></span>
          <span>응답 (return)</span>
        </div>
      </div>
    </div>

    <footer>마지막 업데이트 · 2026-05-28</footer>
  </div>
</body>
</html>
